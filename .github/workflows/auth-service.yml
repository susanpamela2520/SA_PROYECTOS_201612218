name: Auth Service - DeliverEats

on:
  push:
    branches: [main]
    paths:
      - "delivereats/auth-service/**" #si hay cambios en el servicio de Auth se activa

jobs:
  ci-cd-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout del código
        uses: actions/checkout@v4

      - name: 2. Setup de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "delivereats/auth-service/package-lock.json"

      - name: 3. Instalar dependencias
        run: |
          cd delivereats/auth-service
          npm ci

      - name: 4. Ejecutar Tests Unitarios (Falla si < 70% cobertura)
        run: |
          cd delivereats/auth-service
          npm run test:cov

      # --- AQUÍ EMPIEZA EL CD (ENTREGA CONTINUA) ---

      - name: 5. Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 6. Build y Push de imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: ./delivereats/auth-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:latest

      # --- PASO A KUBERNETES ---

      - name: 7. Despliegue en Kubernetes
        run: |
          echo "Desplegando en el clúster..."
          # Aquí usaremos kubectl o helm más adelante cuando configures tu K8s

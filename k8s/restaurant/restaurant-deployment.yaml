apiVersion: apps/v1
kind: Deployment
metadata:
  name: restaurant-service
  namespace: sa
  labels:
    app: restaurant-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: restaurant-service
  template:
    metadata:
      labels:
        app: restaurant-service
    spec:
      containers:
        - name: restaurant-container
          image: pampam4188/restaurant-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 50052
          readinessProbe:
            tcpSocket:
              port: 50052
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 50052
            initialDelaySeconds: 20
            periodSeconds: 20
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: restaurant-service-config
                  key: PORT
            - name: DB_HOST_REST
              valueFrom:
                configMapKeyRef:
                  name: restaurant-service-config
                  key: DB_HOST_REST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: restaurant-service-config
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: restaurant-service-config
                  key: DB_USER
            - name: DB_NAME_REST
              valueFrom:
                configMapKeyRef:
                  name: restaurant-service-config
                  key: DB_NAME_REST
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: restaurant-service-config
                  key: RABBITMQ_URL
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: restaurant-service-secrets
                  key: DB_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: restaurant-service
  namespace: sa
spec:
  selector:
    app: restaurant-service
  ports:
    - protocol: TCP
      port: 50052
      targetPort: 50052
  type: ClusterIP

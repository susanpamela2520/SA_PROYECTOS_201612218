apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery-service
  namespace: sa
  labels:
    app: delivery-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: delivery-service
  template:
    metadata:
      labels:
        app: delivery-service
    spec:
      containers:
        - name: delivery-container
          image: pampam4188/delivery-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 50054
          readinessProbe:
            tcpSocket:
              port: 50054
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 50054
            initialDelaySeconds: 20
            periodSeconds: 20
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: delivery-service-config
                  key: PORT
            - name: DB_HOST_DELIVERY
              valueFrom:
                configMapKeyRef:
                  name: delivery-service-config
                  key: DB_HOST_DELIVERY
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: delivery-service-config
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: delivery-service-config
                  key: DB_USER
            - name: DB_NAME_DELIVERY
              valueFrom:
                configMapKeyRef:
                  name: delivery-service-config
                  key: DB_NAME_DELIVERY
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: delivery-service-config
                  key: RABBITMQ_URL
            - name: ORDER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: delivery-service-config
                  key: ORDER_SERVICE_URL
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: delivery-service-secrets
                  key: DB_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: delivery-service
  namespace: sa
spec:
  selector:
    app: delivery-service
  ports:
    - protocol: TCP
      port: 50054
      targetPort: 50054
  type: ClusterIP

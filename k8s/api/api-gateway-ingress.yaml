apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sa-ingress-node
  namespace: sa
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, UPDATE"
  namespace: sa
spec:
  rules:
    - host: 34.28.178.39.nip.io #IP ingress controller (nginx)
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 3000

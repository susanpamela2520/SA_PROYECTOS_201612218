apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: sa
  labels:
    app: payment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-container
          image: pampam4188/payment-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 50055
          readinessProbe:
            tcpSocket:
              port: 50055
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 50055
            initialDelaySeconds: 20
            periodSeconds: 20
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: payment-service-config
                  key: PORT
            - name: DB_HOST_PAYMENT
              valueFrom:
                configMapKeyRef:
                  name: payment-service-config
                  key: DB_HOST_PAYMENT
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: payment-service-config
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: payment-service-config
                  key: DB_USER
            - name: DB_NAME_PAYMENT
              valueFrom:
                configMapKeyRef:
                  name: payment-service-config
                  key: DB_NAME_PAYMENT
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: payment-service-config
                  key: RABBITMQ_URL
            - name: ORDER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: payment-service-config
                  key: ORDER_SERVICE_URL
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-service-secrets
                  key: DB_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: sa
spec:
  selector:
    app: payment-service
  ports:
    - protocol: TCP
      port: 50055
      targetPort: 50055
  type: ClusterIP

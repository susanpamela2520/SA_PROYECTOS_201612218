apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: sa
  labels:
    app: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-container
          image: pampam4188/order-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 50053
          readinessProbe:
            tcpSocket:
              port: 50053
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 50053
            initialDelaySeconds: 20
            periodSeconds: 20
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: order-service-config
                  key: PORT
            - name: DB_HOST_ORDER
              valueFrom:
                configMapKeyRef:
                  name: order-service-config
                  key: DB_HOST_ORDER
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: order-service-config
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: order-service-config
                  key: DB_USER
            - name: DB_NAME_ORDER
              valueFrom:
                configMapKeyRef:
                  name: order-service-config
                  key: DB_NAME_ORDER
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: order-service-config
                  key: RABBITMQ_URL
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: order-service-secrets
                  key: DB_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: sa
spec:
  selector:
    app: order-service
  ports:
    - protocol: TCP
      port: 50053
      targetPort: 50053
  type: ClusterIP

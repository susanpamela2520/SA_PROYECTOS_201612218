<div class="container p-4">
  <header class="mb-4 flex justify-between items-center">
    <h1>🥡 Pedidos Disponibles</h1>
    <button mat-icon-button routerLink="/dashboard">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <button mat-stroked-button (click)="loadOrders()">🔄 Actualizar</button>
  </header>

  <div class="grid gap-4">
    @for (order of availableOrders(); track order.id) {
      <mat-card class="p-4 border-l-4 border-blue-500">
        <div class="flex justify-between">
          <div>
            <h2 class="text-xl font-bold">Orden #{{ order.id }}</h2>
            <p class="text-gray-600">{{ order.items.length }} productos</p>
            <p class="font-bold mt-2">Total: Q{{ order.total }}</p>
          </div>
          <div class="text-right">
            <span class="bg-yellow-100 text-yellow-800 px-2 py-1 rounded">
              {{ order.status }}
            </span>
          </div>
        </div>

        <div class="mt-4 flex justify-end">
          <button mat-flat-button color="primary" (click)="accept(order.id)">
            <mat-icon>moped</mat-icon> ACEPTAR ENTREGA
          </button>
        </div>
      </mat-card>
    } @empty {
      <div class="text-center p-8 bg-gray-50 rounded">
        <mat-icon class="text-4xl text-gray-400">remove_shopping_cart</mat-icon>
        <p>No hay pedidos listos en este restaurante.</p>
      </div>
    }
  </div>
</div>
